{% extends 'BaseTeacher.html' %}
{% load static %}

{% block extra_css %}
<title>Mentora - Create a Course</title>
<link rel="stylesheet" href="{% static 'css/courses.css' %}">
{% endblock %}


{% block content %}
<main class="main-content">
  <div class="mb-3">
    <h1 class="fw">Create a New Course</h1>
  </div>
  <!--  Added By Saim:-->
  <div class="">
    <div class="border shadow-sm course-creation-detail-card" style="background-color: white; border-radius: 20px">
      </ul>

      <div class="p-4" id="course-creation-form">

        <div class="mb-3">
          <h6 class="fw-bold text-uppercase small text-muted mb-2">Course Details</h6>
        </div>

        <hr class="my-4">
        <form method="POST">
          <!--  ----------------------------------------------------------------->
          {% csrf_token %}

          <!--  Added By Mark:-->
          <div class="form-group mb-4">
            <label for="course-name-input">Course Name</label>
            <input type="text" class="form-control" id="course-name-input" name="title" placeholder="My Course"
              required value="{{ course.title }}">
          </div>
          <!--  ----------------------------------------------------------------->

          <!-- -------------------------------------------------------------------- -->
          <div class="form-group mb-4">
            <!-- Added by Mark Task Details -->
            <div class="form-group mb-4">
              <label for="course-description-input">Course Description</label>
              <textarea name="description" class="form-control" id="course-description-input"
                placeholder="This is my course!" required>{{ course.description }}</textarea>
            </div>

            <!-- Added by Mark -->
            <div class="max-students mb-4">
              <label for="max-students">Max Students</label>
              <input type="number" name="max_students" id="max-students-input" min="1" max="100" required>
            </div>
            <!--Added By Ariel  box to check if mentor wants to make course private or not-->
            <div class="private-check mb-4">
              <label for="max-students">Private Course</label>
              <input type="checkbox" name="private-box" id="private-input" {% if course.private %}checked{% endif %}>
            </div>
            <!-------------------------------------------------------------------------------------------->
            <!--Added By Saim  Select Students (dynamic programming from JavaScript) -->
            <button type="submit" class="btn btn-primary btn-lg w-100 mb-3" id="Update-Course">
              Create Course
            </button>
            <!----------------------------------------------------------------------------->
        </form>

      </div>


    </div>

  </div>


</main>



{% endblock %}

{% block extra_js %}

{% endblock %}
